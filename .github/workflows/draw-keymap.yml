name: Draw Keymap

on:
  push:
    paths:
      - 'config/corne.keymap'
      - 'config/config_keymap-drawer.yaml'
      - '.github/workflows/draw-keymap.yml'
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install keymap-drawer
        run: |
          python -m pip install --upgrade pip
          pip install keymap-drawer

      - name: Parse keymap
        run: |
          keymap parse -c 2 -z config/corne.keymap >keymap-drawer/corne.yaml

      - name: Draw SVG
        run: |
          keymap draw keymap-drawer/corne.yaml >keymap-drawer/corne.svg

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap-drawer/corne.yaml keymap-drawer/corne.svg
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "ci: redraw corne keymap"
            git push
          fi